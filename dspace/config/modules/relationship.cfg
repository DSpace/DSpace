#---------------------------------------------------------------#
#-----------------RELATIONSHIP CONFIGURATIONS-------------------#
#---------------------------------------------------------------#
# Configuration properties used by the RelationshipService      #
#---------------------------------------------------------------#

# Enable virtual metadata generation from relationships.
# When set to 'true', metadata values are dynamically generated from entity relationships.
# When set to 'false', only metadata stored directly in the database is returned.
# 
# IMPORTANT: This property controls the relationship-based metadata mechanism and is
# mutually exclusive with authority-controlled metadata (CRIS authority framework).
# 
# - Set to 'true' to use relationship-based linking (virtual metadata from relationships)
# - Set to 'false' to use authority-controlled metadata (CRIS authority framework)
# 
# Do NOT mix both approaches for the same metadata field as it causes inconsistent behavior.
# 
# Defaults to true.
# relationship.enable-virtual-metadata = true

# The maximum number of items to be updated when adjusting a relationship.
# This includes the relationship’s left and right item.
# If the max is below 2, the relationship’s left and right item will still be processed. Defaults to 20
# relationship.update.relateditems.max = 20

# The maximum depth of relationships to traverse.
# A value of 5 means that a maximum of 5 levels (relationships) deep will be scanned for updates on both the left side
# and the right side. Indirectly related items requiring more than 5 items will be skipped. Defaults to 5
# relationship.update.relateditems.maxdepth = 5

