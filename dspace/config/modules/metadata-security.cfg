#---------------------------------------------------------------#
#----------------- METADATA SECURITY CONFIGURATIONS --------------------#
#---------------------------------------------------------------#
# This file configures which metadata security levels are ALLOWED for
# specific entity types and metadata fields in the DSpace system.
#
# FRONTEND ACCESS:
#   The Angular frontend fetches these settings via the dedicated REST endpoint:
#     GET /api/core/securitysettings/{entityType}
#   
#   This endpoint reads properties directly from ConfigurationService (this file) and
#   returns them as JSON with metadataSecurityDefault and metadataCustomSecurity.
#
#   Example:
#     GET /api/core/securitysettings/Person
#     Returns:
#     {
#       "metadataSecurityDefault": [0, 1],
#       "metadataCustomSecurity": {
#         "person.email": [0, 1],
#         "person.birthDate": [0, 1]
#       }
#     }
#
#
# For security level definitions (what 0, 1, 2 mean), see:
#   dspace/config/spring/api/spring-dspace-security-metadata.xml
#
# CONFIGURATION HIERARCHY (most specific wins):
# 1. Field-level:  metadatavalue.visibility.{EntityType}.{field}.settings
# 2. Entity-level: metadatavalue.visibility.{EntityType}.settings
# 3. Global:       metadatavalue.visibility.settings (fallback)
#
# FORMAT:
#   metadatavalue.visibility[.EntityType][.metadataField].settings = [0 1 2]
#
# WHERE:
#   - EntityType: Optional. The dspace.entity.type value (e.g., Person, Publication, Project)
#   - metadataField: Optional. Fully qualified metadata field (e.g., person.email, dc.title)
#   - [0 1 2]: Array of ALLOWED security level integers. Empty [] means no security levels allowed.
#
# EXAMPLES:
#   # Allow all Person items to use security levels 0, 1, and 2 for any metadata field
#   metadatavalue.visibility.Person.settings = [0 1 2]
#
#   # Only allow levels 1 and 2 for person.email (restricts from being set to public level 0)
#   metadatavalue.visibility.Person.person.email.settings = [1 2]
#
#   # Prevent any security levels for dc.title (always follows standard visibility rules)
#   metadatavalue.visibility.Publication.dc.title.settings = []
#
# HOW IT WORKS:
#   - These settings control which security levels can be ASSIGNED to metadata values
#   - They do NOT directly control visibility (that's determined by the security level itself)
#   - When adding secured metadata, the requested security level must be in the allowed list
#   - Frontend UI displays toggle buttons for only the allowed security levels
#
#---------------------------------------------------------------#

#####  Metadata Security Control Settings  #####

# Global default: No security levels allowed by default (empty array)
# This means metadata follows standard field-level visibility rules unless overridden
metadatavalue.visibility.settings = []

# Entity-level default for Person items (EXAMPLE - currently commented out)
# Uncomment to allow security levels 0 and 1 for all Person metadata fields
# metadatavalue.visibility.Person.settings = [0 1]

# Field-specific settings for Person entity
# These allow security levels 0 and 1 for sensitive personal information fields
metadatavalue.visibility.Person.person.birthDate.settings = [0 1]
metadatavalue.visibility.Person.person.email.settings = [0 1]
