#---------------------------------------------------------------#
#--------------------CRIS CONFIGURATIONS------------------------#
#---------------------------------------------------------------#
# These configs are used by the CRIS extended functionalities   #
#---------------------------------------------------------------#

########### CRIS Consumer configuration ###############
# Controls whether the CrisConsumer skips metadata fields that have no authority value.
# When true (default): Metadata without a linked entity UUID (authority) is ignored.
#                       This prevents creating new related entities from metadata without authority.
# When false: The consumer attempts to create related entities even for metadata without authority.
# Example: When a dc.contributor.author has no authority (no linked Person), setting this to
#          false will trigger the creation of a new Person entity.
cris-consumer.skip-empty-authority = true

# Allows fine-grained control over skip-empty-authority behavior for specific metadata fields.
# This is an array of metadata field names (in dot notation, e.g., "dc.contributor.editor").
# When a field is listed here, its behavior is REVERSED relative to the global cris-consumer.skip-empty-authority setting:
# - If global is true: fields in this list will NOT skip (processes empty authority)
# - If global is false: fields in this list WILL skip (ignores empty authority)
# This allows different handling for different metadata fields.
# Example: cris-consumer.skip-empty-authority.metadata = dc.contributor.editor, dc.relation.project
# In the example above, with global skip-empty-authority=false:
#   - dc.contributor.author: processes (not in list, follows global=false)
#   - dc.contributor.editor: skips (in list, reverses to true)
# cris-consumer.skip-empty-authority.metadata = 

# Controls whether to update the metadata value when resolving a reference to an existing entity.
# When false (default): When linking to an existing entity, only the authority UUID and confidence
#                       are updated. The original text value is preserved.
# When true: When linking to an existing entity, the metadata value is overwritten to match
#            the value from the related entity (e.g., the title of the linked Person/OrgUnit).
# Example: If you add "Mario Rossi" and it links to an existing Person with title "M. Rossi",
#          setting this to true will change the metadata value to "M. Rossi".
cris.item-reference-resolution.override-metadata-value = false

# It specifies whether CrisConsumer should use template while creating related items.
# By default it is false and so no template is used.
# cris.import.submission.enabled.entity.use-template = true

# It specifies whether CrisConsumer should use template while creating
# related item linked via specified authority field.
# cris.import.submission.enabled.entity.{authority_field_separated_by_underscores}.use-template = true