#---------------------------------------------------------------#
#-----------------DISCOVERY CONFIGURATIONS----------------------#
#---------------------------------------------------------------#
# Configuration properties used solely by the Discovery         #
# faceted-search system.                                        #
#---------------------------------------------------------------#
##### Search Indexing #####
discovery.search.server = ${solr.server}/${solr.multicorePrefix}search

#Enable the url validation of the search.server setting above.
#Defaults to true: validation is enabled
#discovery.solr.url.validation.enabled = true

#Char used to ensure that the sidebar facets are case insensitive
#discovery.solr.facets.split.char=\n|||\n

# Limit to number of characters indexed by Discovery/Solr in the fulltext of a document
# Default is 100,000 characters. Unlimited characters = -1
# Be aware that setting this to a large value (or unlimited) will require more memory and space in Solr.
# Changing this value also requires reindexing all existing objects to take effect.
#discovery.solr.fulltext.charLimit=100000

# discovery.index.ignore-variants = false
# discovery.index.ignore-authority = false
discovery.index.projection=dc.title,dc.contributor.*,dc.date.issued
discovery.index.projection=person.affiliation.name
discovery.index.projection=person.identifier.orcid
discovery.index.projection=oairecerif.person.affiliation

# Restricts the indexing of the submitter for archived items
# By default the submitter information from the corresponding eperson is not indexed.
# If you set this value to true, than the submitter information is indexed and you will need to reindex search core
# discovery.index.item.submitter.enabled = false

# Allow auto-reindexing.
# If any database migrations are applied to your database (via Flyway), then a
# reindex flag is always written to '[dspace]/solr/search/conf/reindex.flag'.
# Whenever the DSpace webapp is (re)started, it checks whether the autoReindex
# property is enabled AND that such a file exists.  If the two conditions are
# satisfied, a background reindex of all content is triggered in Discovery.
# Defaults to true: auto-reindexing is enabled.
#discovery.autoReindex = true

# Value used for the namedresourcetype facet used by the mydspace
# <sort-value>\n|||\n<display-value>###<authority-value>
# the separator between the sort-value and the display-value \n|||\n must
# match the value of the discovery.solr.facets.split.char defined above
# the sort-value can be used to force a fixed order for the facet if it is
# configured in the discovery.xml to be sorted by value
discovery.facet.namedtype.item = 000item\n|||\nArchived###item
discovery.facet.namedtype.workspace = 001workspace\n|||\nWorkspace###workspace
discovery.facet.namedtype.workflow.item = 002workflow\n|||\nWorkflow###workflow
discovery.facet.namedtype.workflow.claimed = 003workflow\n|||\nValidation###validation
discovery.facet.namedtype.workflow.pooled = 004workflow\n|||\nWaiting for Controller###waitingforcontroller

# Set the number of retry of a query when stale objects are found.
# Set to -1 if stale objects should be ignored. Set to 0 if you want to avoid extra query but take the chance to cleanup 
# the index each time that stale objects are found. Default 3
discovery.removestale.attempts = 3

# The field to use when filtering for geospatial metadata (boolean flag)
discovery.filter.geospatial.field = dcterms.spatial

# Set to true to escape HTML tags in hit highlight results
discovery.highlights.escape-html = true
# Set the fields that should not escape HTML tags in hit highlight results when discovery.highlights.escape-html is true
# It is possible to provide multiple fields by separating them by commas like this: dc.description.abstract, dc.title
# discovery.highlights.html-allowed-fields =

#---------------------------------------------------------------#
#------------- STRICT BEST MATCH INDEXING CONFIGURATION ------#
#---------------------------------------------------------------#
# Configuration properties for SolrServiceStrictBestMatchIndexingPlugin
#
# This plugin creates highly normalized versions of person names and titles
# in the 'bestmatchstrict_s' Solr field to enable aggressive fuzzy matching.
# Unlike the standard best match plugin which preserves original formatting,
# the strict plugin applies configurable normalization rules to create
# simplified, standardized versions that improve name matching accuracy.
#
# All properties default to 'true' for maximum normalization.

# Controls case normalization for improved matching across different capitalizations
# When enabled: "John SMITH" and "john smith" and "John Smith" all become "john smith"
# When disabled: Original case is preserved, requiring exact case matching
# Default: true
# solr-service.strict-best-match.exclude.letter-case = true

# Controls punctuation removal to handle names with different formatting
# When enabled: "O'Connor, Ph.D." becomes "OConnor PhD"
# When disabled: Punctuation is preserved, "O'Connor" won't match "OConnor"
# Removes: periods, commas, apostrophes, semicolons, colons, quotation marks, etc.
# Default: true
# solr-service.strict-best-match.exclude.punctuation = true

# Controls special dash character normalization for hyphenated names
# When enabled: "González‐Rodríguez" (em-dash) becomes "González Rodríguez"
# When disabled: Special dashes are preserved, potentially missing matches
# Specifically handles the Unicode em-dash character (U+2010) commonly used in names
# Default: true
# solr-service.strict-best-match.exclude.dash = true

# Controls numeric character removal from names and titles
# When enabled: "John Smith Jr. 2nd" becomes "John Smith Jr nd"
# When disabled: Numbers are preserved, may help with titles like "Henry VIII"
# Useful for removing accidental numbers or standardizing suffixes
# Default: true
# solr-service.strict-best-match.exclude.numbers = true

# Controls whitespace normalization to handle inconsistent spacing
# When enabled: "John    Smith  Jr." becomes "John Smith Jr."
# When disabled: Multiple spaces and irregular whitespace are preserved
# Collapses multiple consecutive spaces into single spaces and trims leading/trailing
# Default: true
# solr-service.strict-best-match.exclude.normalize-whitespaces = true

#
# USAGE EXAMPLE:
# Original name: "Dr. María González-Rodríguez, Ph.D."
# With all normalization enabled: "dr maria gonzalez rodriguez phd"
#
# This normalized version will match queries like:
# - "maria gonzalez" (partial match, case insensitive)
# - "GONZALEZ RODRIGUEZ" (case insensitive, no punctuation)
# - "dr maria" (title + first name)
# - "phd rodriguez" (degree + last name)

#---------------------------------------------------------------#
#------------- SOLR AUTOCOMPLETE SUGGESTION CONFIGURATION ------#
#---------------------------------------------------------------#
# Set fields to index as *_suggest Solr fields for use with the suggest request handler
# (autocomplete, search suggestion)
# a field like dc.contributor.author will be indexed as dc.contributor.author_suggest
# with field type suggestAutoComplete (see search/conf/schema.xml)
# These fields must be referenced in search/conf/solrconfig.xml with a suggest dictionary
# definition. Each dictionary name can then be used as a controlled vocabulary name
# in submission-forms.xml
#discovery.suggest.field = dc.contributor.author
#discovery.suggest.field = dc.subject

# Allowlist of dictionary names that the /suggest endpoint will accept.
# If empty or not set, no dictionaries are allowed (endpoint is effectively disabled).
# Use * to allow all configured dictionaries.
# Separate multiple values with commas.
#discovery.suggest.allowed-dictionaries = *
#discovery.suggest.allowed-dictionaries = subject, authors, countries_file
