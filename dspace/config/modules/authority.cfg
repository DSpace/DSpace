# AUTHORITY PLUGIN CONFIGURATION (EXAMPLE)
#---------------------------------------------------------------#
# This section shows a complete authority configuration using both OrcidAuthority
# and ItemAuthority for various entity types. Uncomment and customize as needed.
#
# AUTHORITY PLUGIN TYPES:
#
# 1. OrcidAuthority: Searches ORCID registry for researchers
#    - AuthorAuthority: General author lookup
#    - EditorAuthority: Editor lookup
#    - AuthorStrictMatchAuthority: Strict matching algorithm
#    - AuthorCoarseMatchAuthority: Relaxed matching algorithm
#
# 2. ItemAuthority: Searches local DSpace entities
#    - DataSetAuthority: Product entity type
#    - JournalAuthority: Journal entity type
#    - ProjectAuthority: Project entity type
#    - PublicationAuthority: Publication entity type
#    - EquipmentAuthority: Equipment entity type
#    - NoneAuthority: Special case for untyped entities
#
# 3. EPersonAuthority: Searches DSpace user accounts
#
# 4. GroupAuthority: Searches DSpace user groups
#
#####  Authority Control Settings  #####
# plugin.named.org.dspace.content.authority.ChoiceAuthority = \
#  org.dspace.content.authority.OrcidAuthority = AuthorAuthority,\
#  org.dspace.content.authority.OrcidAuthority = EditorAuthority,\
#  org.dspace.content.authority.OrcidAuthority = AuthorStrictMatchAuthority, \
#  org.dspace.content.authority.OrcidAuthority = AuthorCoarseMatchAuthority, \
#  org.dspace.content.authority.ItemAuthority = DataSetAuthority,\
#  org.dspace.content.authority.ItemAuthority = JournalAuthority,\
#  org.dspace.content.authority.ItemAuthority = OrgUnitAuthority, \
#  org.dspace.content.authority.ItemAuthority = ProjectAuthority,\
#  org.dspace.content.authority.ItemAuthority = PublicationAuthority,\
#  org.dspace.content.authority.ItemAuthority = NoneAuthority,\
#  org.dspace.content.authority.ItemAuthority = EquipmentAuthority,\
#  org.dspace.content.authority.EPersonAuthority = EPersonAuthority,\
#  org.dspace.content.authority.GroupAuthority = GroupAuthority
#
#---------------------------------------------------------------#
# ITEMAUTHORITY CONFIGURATION
#---------------------------------------------------------------#
# ItemAuthority plugins require entity type and optionally external data source configuration.
#
# cris.ItemAuthority.forceInternalName = true (default)
#   - TRUE: Uses item's internal name (dc.title) in authority choice label
#   - FALSE: Uses external source name if available (e.g., name from ORCID)
#   - Global default for all ItemAuthority plugins
#   - Can be overridden per authority (see AuthorStrictMatchAuthority example below)
#
# cris.ItemAuthority.<PluginName>.forceInternalName = <true|false>
#   - Per-authority override of the global forceInternalName setting
#   - Example: AuthorStrictMatchAuthority.forceInternalName = false
#     * Shows ORCID name in dropdown instead of internal dc.title
#     * Useful when external source has more authoritative name data
#
# cris.ItemAuthority.forceInternalName = true
#
# # AuthorStrictMatchAuthority configuration
# # Override global setting to show ORCID name in dropdown
# cris.ItemAuthority.AuthorStrictMatchAuthority.forceInternalName = false
#
# # AuthorCoarseMatchAuthority configuration
# # Override global setting to show ORCID name in dropdown
# cris.ItemAuthority.AuthorCoarseMatchAuthority.forceInternalName = false
#
#---------------------------------------------------------------#
# ITEMAUTHORITY ENTITY TYPE MAPPINGS
#---------------------------------------------------------------#
# Each ItemAuthority plugin must specify which entity type it searches for.
# This filters Solr queries to only return items of the specified type.
#
# REQUIRED for ItemAuthority plugins. Without entityType, the authority won't work.
#
# Entity type values must match dspace.entity.type metadata values in the repository:
# cris.ItemAuthority.DataSetAuthority.entityType = Product
#   - Searches for items with dspace.entity.type = "Product"
#   - Use for: dc.relation.product, dc.relation.dataset, etc.
#
# cris.ItemAuthority.JournalAuthority.entityType = Journal
#   - Searches for items with dspace.entity.type = "Journal"
#   - Use for: dc.relation.journal, dc.relation.ispartof, etc.
#
# cris.ItemAuthority.OrgUnitAuthority.entityType = OrgUnit
#   - Searches for items with dspace.entity.type = "OrgUnit"
#   - Use for: person.affiliation.name, dc.publisher, crispj.organization, etc.
#
# cris.ItemAuthority.ProjectAuthority.entityType = Project
#   - Searches for items with dspace.entity.type = "Project"
#   - Use for: dc.relation.project
#
# cris.ItemAuthority.PublicationAuthority.entityType = Publication
#   - Searches for items with dspace.entity.type = "Publication"
#   - Use for: dc.relation.publication, dc.relation.references, etc.
#
# cris.ItemAuthority.NoneAuthority.entityType = none
#   - Special case: Searches for items WITHOUT a dspace.entity.type
#   - Use for: default none entity
#
# cris.ItemAuthority.EquipmentAuthority.entityType = Equipment
#   - Searches for items with dspace.entity.type = "Equipment"
#   - Use for: dc.relation.equipment, laboratory equipment tracking, etc.


#---------------------------------------------------------------#
# AUTHORITY SOURCE IDENTIFIER
#---------------------------------------------------------------#
# Specifies an identifier used by the frontend to display the correct icon or badge
# next to authority choices.
#
# FORMAT: cris.ItemAuthority.<AuthorityName>.source = <identifier>
#
# Default: "local" (if not specified)
#
# #define source identifier for each authority
# cris.ItemAuthority.AuthorAuthority.source = orcid
# cris.ItemAuthority.EditorAuthority.source = orcid
# cris.ItemAuthority.AuthorStrictMatchAuthority.source = orcid
# cris.ItemAuthority.AuthorCoarseMatchAuthority.source = orcid


#---------------------------------------------------------------#
# ORCID AUTHORITY CONFIGURATION
#---------------------------------------------------------------#
# Controls ORCID integration behavior including metadata fields in authority
# choice dropdowns and authority value format for entity creation/linking.
#
# Two main configuration areas:
# 1. ORCID Extras (what metadata appears in dropdowns and auto-fills)
# 2. ORCID Authority Prefix (how Person entities are created/linked)
#
#---------------------------------------------------------------#
# ORCID EXTRAS CONFIGURATION
#---------------------------------------------------------------#
# Controls which ORCID metadata fields appear in authority choice dropdowns.
# Two fields are supported: orcid-id and institution.
#
# Available fields:
#   orcid-id    - ORCID identifier (e.g., "0000-0001-2345-6789")
#   institution - Employment/affiliation from ORCID profile
#
# Configuration properties (per plugin and field):
#
# cris.OrcidAuthority.<PluginName>.<field>.key = <metadata_field_name>
#   - Metadata field name in underscore notation
#   - Default for orcid-id.key: person_identifier_orcid
#   - Default for institution.key: oairecerif_author_affiliation
#
# cris.OrcidAuthority.<PluginName>.<field>.display = <true|false>
#   - TRUE: Shows field in dropdown (e.g., "Doe, John (0000-0001-2345-6789)")
#   - FALSE: Hides field from dropdown display
#   - Default: true for both fields
#
# cris.OrcidAuthority.<PluginName>.<field>.as-data = <true|false>
#   - TRUE: Adds "data-" prefixed entry to extras map for auto-population
#   - FALSE: Field not available for auto-population
#   - Default: true for both fields
#
# Global defaults (apply to all OrcidAuthority plugins unless overridden):
#   cris.OrcidAuthority.orcid-id.key = person_identifier_orcid
#   cris.OrcidAuthority.orcid-id.display = true
#   cris.OrcidAuthority.orcid-id.as-data = true
#   cris.OrcidAuthority.institution.key = oairecerif_author_affiliation
#   cris.OrcidAuthority.institution.display = true
#   cris.OrcidAuthority.institution.as-data = true
#
# Example per-plugin overrides:
# cris.OrcidAuthority.AuthorAuthority.institution.key = oairecerif_author_affiliation
# cris.OrcidAuthority.EditorAuthority.institution.key = oairecerif_editor_affiliation
#
#---------------------------------------------------------------#
# ORCID AUTHORITY PREFIX CONFIGURATION
#---------------------------------------------------------------#
# Controls the authority value format when users select ORCID profiles.
# This prefix determines how Person entities are created and linked.
#
# Configuration property:
#   orcid.authority.prefix = <prefix_value>
#
# Default: "will be referenced::ORCID::"
#   - Format: will be referenced::ORCID::<orcid-id>
#   - Example: will be referenced::ORCID::0000-0001-8262-5562
#   - Behavior: Links to existing Person if found by matching ORCID ID in dspace.sourceId
#   - If no match found: Authority value remains as "will be referenced::ORCID::<orcid-id>"
#
# Alternative: "will be generated::ORCID::"
#   - Format: will be generated::ORCID::<orcid-id>
#   - Example: will be generated::ORCID::0000-0001-8262-5562
#   - Behavior: Always creates a new Person entity when submission is completed
#   - CrisConsumer automatically generates Person with:
#     * dc.title = Author name from ORCID
#     * person.identifier.orcid = ORCID ID (if .as-data = true)
#     * person.affiliation.name = Institution from ORCID (if .as-data = true)
#     * dspace.entity.type = Person
#     * dspace.sourceId = ORCID::<orcid-id>
#
# How it works:
# 1. User searches for author in submission form
# 2. OrcidAuthority queries both local DSpace persons and ORCID registry
# 3. ORCID results returned with authority = <prefix><orcid-id>
# 4. User selects ORCID profile, extras map contains data- prefixed metadata:
#    - data-person_identifier_orcid = <orcid-id> (if orcid-id.as-data = true)
#    - data-oairecerif_author_affiliation = <institution> (if institution.as-data = true)
# 5. On submission, CrisConsumer processes the authority value:
#    - "will be generated::" → Creates new Person, populates from data- extras
#    - "will be referenced::" → Links to existing Person by ORCID in dspace.sourceId
#
# Requirements for ORCID metadata auto-population:
#   - relationship.enable-virtual-metadata = false (required to disable old system)
#   - cris.OrcidAuthority.<Plugin>.orcid-id.as-data = true (enables ORCID auto-fill)
#   - cris.OrcidAuthority.<Plugin>.institution.as-data = true (enables affiliation auto-fill)
#
# Recommended configuration:
# orcid.authority.prefix = will be generated::ORCID::


