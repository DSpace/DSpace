#---------------------------------------------------------------#
# SPECIAL AUTHORITY CONFIGURATIONS
#---------------------------------------------------------------#
#
# oairecerif.identifier.url: URL-based identifiers (requires input-type="link" in form)
# authority.controlled.oairecerif.identifier.url = true
#   - TRUE: Enables AuthorityLinkConsumer to synchronize value and authority
#     * If value="label" and authority="https://url.com", both are stored
#     * If value="" and authority="https://url.com", value becomes "https://url.com"
#     * If value="https://url.com" and authority="", authority becomes "https://url.com"
#     * Ensures authority field always contains the actual URL
#     * Required for fields with <input-type>link</input-type> in submission forms
#   - FALSE: No synchronization, value and authority stored as-is
#     * Use when: Field doesn't use link input type, no URL tracking needed
#

#---------------------------------------------------------------#
# SOLR SUGGEST AUTHORITY CONFIGURATION
#---------------------------------------------------------------#
# Provides autocomplete suggestions from existing metadata values indexed in Solr facets.
# Uses prefix matching: query "test" suggests "test subject" but NOT "subject test".
#
# How it works:
# - Queries Solr facet index (not authority index)
# - Returns values that START with the search query (case-insensitive)
# - No authority value stored (authority field = null)
#
# Configuration:
#
# choices.plugin.dc.subject = SolrSuggestAuthority
# choices.presentation.dc.subject = suggest
# authority.controlled.dc.subject = true
#
# SolrSuggestAuthority.dc_subject.facetname = subject
#   - Specifies which Solr facet to query
#   - Field name uses underscores: dc_subject for dc.subject
#   - IMPORTANT: "_ac" suffix is automatically appended
#     * Config: facetname = subject
#     * Actual query: subject_ac
#
# Use case: Suggest keywords/subjects from previously-used repository values


#---------------------------------------------------------------#
# CONTROLLED VOCABULARY AUTHORITY STORAGE
#---------------------------------------------------------------#
# Controls whether authority keys are stored when users select controlled vocabulary terms.
# Applies to all DSpaceControlledVocabulary plugins unless overridden per-vocabulary.
#
# vocabulary.plugin.authority.store = <true|false>
#   - TRUE: Stores node ID in metadata authority field
#     * Format: "vocabularyName:nodeId" (e.g., "srsc:SCB119")
#     * Preserves exact term reference even if labels change
#     * Required for authority-controlled browse/facets
#     * Enables tracking of vocabulary term usage
#   - FALSE (default): Authority field remains null
#     * Only the value/label is stored in metadata value field
#     * Vocabulary selections treated as plain text
#     * Use when: Simple flat vocabularies, labels never change, authority tracking not needed
#
# Per-vocabulary override:
#   vocabulary.plugin.<vocabularyName>.authority.store = <true|false>
#   - Overrides global setting for specific vocabulary
#   - Example: vocabulary.plugin.srsc.authority.store = true

#---------------------------------------------------------------#
# BITSTREAM LINKING
#---------------------------------------------------------------#
# Bitstreams versions & replacements can be linked together with the following metadata.
# The UUID of the related Bitstream is stored as the authority value.
authority.controlled.dspace.bitstream.hasCopies = true
authority.controlled.dspace.bitstream.isCopyOf = true
authority.controlled.dspace.bitstream.isReplacedBy = true
authority.controlled.dspace.bitstream.isReplacementOf = true
authority.required.dspace.bitstream.hasCopies = true
authority.required.dspace.bitstream.isCopyOf = true
authority.required.dspace.bitstream.isReplacedBy = true
authority.required.dspace.bitstream.isReplacementOf = true
