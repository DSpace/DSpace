name: DSpace Build & Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REMOTE_USER: ${{ secrets.VPS_USER }}
  REMOTE_HOST: ${{ secrets.VPS_HOST_DEV }}
  REMOTE_DIR: "/tmp/dspace-build"
  DSPACE_INSTALL_DIR: "/dspaceinstall"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build no runner do GitHub (hosted)
  # ─────────────────────────────────────────────
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Cache Maven ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cria o local.cfg ANTES do mvn package, para que o build
      # já o inclua no pacote de instalação gerado
      - name: Criar arquivo local.cfg
        run: |
          cat > dspace/config/local.cfg << EOF
          dspace.dir = /dspaceinstall
          dspace.server.url = https://dev.interacoes.ltap.ifce.edu.br/server
          dspace.server.ssr.url = https://dev.interacoes.ltap.ifce.edu.br/server
          dspace.ui.url = https://dev.interacoes.ltap.ifce.edu.br
          dspace.name = InterAções - SASE/MEC
          dspace.shortname = InterAções
          default.language = pt_BR

          solr.server = http://localhost:8983/solr
          solr.multicorePrefix =

          db.url = jdbc:postgresql://localhost:5432/dspace
          db.driver = org.postgresql.Driver
          db.dialect = org.dspace.util.DSpacePostgreSQLDialect
          db.username = dspace
          db.password = ${{ secrets.DB_PASSWORD_DEV }}
          db.schema = public
          db.maxconnections = 30
          db.maxwait = 10000
          db.minidle = 0
          db.maxidle = 10
          db.initialsize = 0
          db.maxconnlifetime = -1
          db.removeabandoned = false
          db.removeabandonedtimeout = 300

          logging.server.include-after-request = false
          logging.server.include-client-info = false
          logging.server.include-headers = false
          logging.server.include-payload = false
          logging.server.include-query-string = false
          logging.server.include-stacktrace-for-httpcode = 422
          logging.server.max-payload-length = 10000

          mail.server = smtp.sendgrid.net
          mail.server.port = 587
          mail.server.use.tls = true
          mail.server.use.ssl = false
          mail.server.username = apikey
          mail.server.password = ${{ secrets.SMTP_PASSWD }}
          mail.from.address = no-reply@ltap.ifce.edu.br
          EOF

      - name: mvn package
        run: |
          mvn --batch-mode \
              -Denforcer.skip=true \
              package \
              -DskipTests

      - name: Compactar artefato de instalação
        run: |
          tar -czf dspace-installer.tar.gz \
            -C dspace/target \
            dspace-installer

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: dspace-installer
          path: dspace-installer.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Transferência e instalação no servidor
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download do artefato gerado no build
        uses: actions/download-artifact@v4
        with:
          name: dspace-installer

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_DEV }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST_DEV }}" >> ~/.ssh/known_hosts

      - name: SCP — enviar artefato ao servidor
        run: |
          ssh $REMOTE_USER@$REMOTE_HOST "mkdir -p $REMOTE_DIR"
          scp dspace-installer.tar.gz \
              $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/dspace-installer.tar.gz

      - name: SSH — instalar DSpace no servidor
        run: |
          ssh $REMOTE_USER@$REMOTE_HOST << 'ENDSSH'
            set -e

            REMOTE_DIR="/tmp/dspace-build"
            DSPACE_INSTALL_DIR="/dspaceinstall"

            echo "==> Descompactando artefato..."
            cd "$REMOTE_DIR"
            tar -xzf dspace-installer.tar.gz

            echo "==> Rodando ant fresh_install..."
            cd "$REMOTE_DIR/dspace-installer"
            ant fresh_install

            echo "==> Migrando banco de dados..."
            "$DSPACE_INSTALL_DIR/bin/dspace" database migrate

          ENDSSH
