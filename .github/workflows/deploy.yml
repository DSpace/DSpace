name: DSpace Build & Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dspace-backend
  DSPACE_INSTALL_DIR: /dspaceinstall

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Build Maven + ant fresh_install + gera imagem Docker + push
  # ──────────────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build, Install & Publish Image
    runs-on: ubuntu-latest

    # PostgreSQL local para o ant fresh_install poder conectar
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dspace
          POSTGRES_USER: dspace
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD_DEV }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dspace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: write   # necessário para push no GHCR

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Cache Maven ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Ant
        run: sudo apt-get install -y ant

      - name: Criar diretório de instalação
        run: sudo mkdir -p $DSPACE_INSTALL_DIR && sudo chown $USER $DSPACE_INSTALL_DIR

      - name: Habilitar pgcrypto no PostgreSQL
        run: |
          PGPASSWORD=${{ secrets.DB_PASSWORD_DEV }} psql \
            -h localhost -U dspace -d dspace \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Criar arquivo local.cfg
        run: |
          cat > dspace/config/local.cfg << EOF
          dspace.dir = $DSPACE_INSTALL_DIR
          dspace.server.url = https://dspace.dev.interacoes.ltap.ifce.edu.br/server
          dspace.server.ssr.url = https://dspace.dev.interacoes.ltap.ifce.edu.br/server
          dspace.ui.url = https://dspace.dev.interacoes.ltap.ifce.edu.br
          dspace.name = InterAções - SASE/MEC
          dspace.shortname = InterAções
          default.language = pt_BR

          solr.server = http://localhost:8983/solr
          solr.multicorePrefix =

          db.url = jdbc:postgresql://localhost:5432/dspace
          db.driver = org.postgresql.Driver
          db.dialect = org.dspace.util.DSpacePostgreSQLDialect
          db.username = dspace
          db.password = ${{ secrets.DB_PASSWORD_DEV }}
          db.schema = public
          db.maxconnections = 30
          db.maxwait = 10000
          db.minidle = 0
          db.maxidle = 10
          db.initialsize = 0
          db.maxconnlifetime = -1
          db.removeabandoned = false
          db.removeabandonedtimeout = 300

          logging.server.include-after-request = false
          logging.server.include-client-info = false
          logging.server.include-headers = false
          logging.server.include-payload = false
          logging.server.include-query-string = false
          logging.server.include-stacktrace-for-httpcode = 422
          logging.server.max-payload-length = 10000

          mail.server = smtp.sendgrid.net
          mail.server.port = 587
          mail.server.use.tls = true
          mail.server.use.ssl = false
          mail.server.username = apikey
          mail.server.password = ${{ secrets.SMTP_PASSWD }}
          mail.from.address = no-reply@ltap.ifce.edu.br
          EOF

      - name: mvn package
        run: |
          mvn --batch-mode \
              -Denforcer.skip=true \
              package \
              -DskipTests

      - name: ant fresh_install
        run: |
          cd dspace/target/dspace-installer
          ant fresh_install

      - name: dspace database migrate
        run: |
          $DSPACE_INSTALL_DIR/bin/dspace database migrate

      # Copia o resultado do ant fresh_install para dentro do contexto
      # de build do Docker (COPY só enxerga paths relativos ao contexto)
      - name: Copiar instalação para contexto do Docker
        run: cp -R $DSPACE_INSTALL_DIR ./dspace-installed

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata da imagem (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy no servidor remoto
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Configurar chave SSH e fazer deploy
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY_DEV }}
          SSH_HOST: ${{ secrets.VPS_HOST_DEV }}
          SSH_USER: ${{ secrets.VPS_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          # Configurar chave SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Executar deploy no servidor via SSH
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            IMAGE="$IMAGE" GHCR_TOKEN="$GHCR_TOKEN" GHCR_ACTOR="$GHCR_ACTOR" \
            bash << 'REMOTE'
              set -e

              echo "==> Login no GHCR..."
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

              echo "==> Pull da nova imagem..."
              docker pull "$IMAGE"

              echo "==> Parando container anterior (se existir)..."
              docker stop dspace-backend || true
              docker rm   dspace-backend || true

              echo "==> Subindo novo container..."
              docker run -d \
                --name dspace-backend \
                --restart unless-stopped \
                -p 8080:8080 \
                -v /volumes/solr:/opt/solr \
                -v /volumes/assetstore:/volumes/dspaceinstall/assetstore \
                "$IMAGE"

              echo "==> Deploy concluído!"
          REMOTE
