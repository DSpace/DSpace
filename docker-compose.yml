Agora atualizar o docker-compose.yml para refletir a nova arquitetura (sem o solr-init separado, já que o entrypoint cuida disso):


Editou um arquivo, leu um arquivo
Editou um arquivo, leu um arquivo
Causa raiz do erro: o ant fresh_install tenta conectar ao banco de dados PostgreSQL, mas durante o docker build não existe rede — o Compose ainda não subiu nenhum serviço. A solução é mover essa etapa para o runtime.

O que mudou
Dockerfile — o build agora só roda o Maven. O Ant sai daqui.

docker-entrypoint.sh (arquivo novo, coloque na raiz do projeto) — script que roda dentro do container na primeira vez que ele sobe:

ant fresh_install → instala o DSpace em /dspace
dspace database migrate → inicializa o schema
Copia os cores Solr para o volume compartilhado
Sobe o server-boot.jar
Nas reinicializações seguintes, ele detecta o arquivo .installed e pula direto para o start.

docker-compose.yml — removido o solr-init separado (o entrypoint já faz isso). Adicionado o volume dspace_install para persistir /dspace entre restarts.

Para subir agora
