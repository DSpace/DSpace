version: "3.9"

# ============================================================
# VPS – Infraestrutura completa
#
# Postgres e Solr rodam localmente como containers.
# DSpace é pulled do GHCR a cada deploy.
#
# Primeiro uso:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   docker compose exec dspace-backend /dspace/bin/dspace create-administrator
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: dspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dspace
      POSTGRES_USER: dspace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dspace -d dspace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dspace-net

  solr:
    image: solr:9-slim
    container_name: dspace-solr
    restart: unless-stopped
    environment:
      SOLR_OPTS: "-Dsolr.config.lib.enabled=true"
    volumes:
      - solr_data:/var/solr
      - solr_cores:/opt/solr/server/solr/configsets
    # Não expõe porta externamente — só acessível internamente
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - dspace-net

  dspace-backend:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: dspace-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      solr:
        condition: service_healthy
    environment:
      JAVA_OPTS: >-
        -Xmx1g -Xms256m
        -Dfile.encoding=UTF-8
        -Ddspace.dir=/dspace
        -Ddspace.server.url=${DSPACE_SERVER_URL}
        -Ddspace.ui.url=${DSPACE_UI_URL}
        -Ddb.url=jdbc:postgresql://postgres:5432/dspace
        -Ddb.username=dspace
        -Ddb.password=${POSTGRES_PASSWORD}
        -Dsolr.server=http://solr:8983/solr
    ports:
      - "8080:8080"
    volumes:
      - dspace_install:/dspace
      - dspace_assetstore:/dspace/assetstore
      - dspace_logs:/dspace/log
      - solr_cores:/solr-configsets
    networks:
      - dspace-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/server/api || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 6

volumes:
  postgres_data:
  solr_data:
  solr_cores:
  dspace_install:
  dspace_assetstore:
  dspace_logs:

networks:
  dspace-net:
    driver: bridge

