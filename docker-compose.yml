Não seria melhor buildar a imagem dentro do servidor direto?

18:06
Sim, faz muito sentido dependendo do contexto. Veja o trade-off:

Buildar no GitHub Actions (GHCR)

Build roda em máquina separada, servidor não fica sobrecarregado
Cache de layers entre builds (mais rápido)
Histórico de imagens versionadas no registry
Mais complexo de configurar (registry, secrets, pull no servidor)
Depende de rede para baixar a imagem no servidor
Buildar direto no servidor ✅ mais simples para o seu caso

GitHub Actions só faz git pull + docker compose up --build
Sem registry, sem tokens extras, sem push/pull de imagem
O servidor já tem o código e constrói localmente
Desvantagem: o build consome CPU/RAM do servidor durante o deploy
Para um VPS com DSpace (build Maven pesado), a única ressalva real é que o build vai usar bastante recurso do servidor por alguns minutos. Se isso não for problema, a abordagem é bem mais simples.

