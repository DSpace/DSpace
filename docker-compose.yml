O erro no ant fresh_install geralmente ocorre porque o banco de dados não está disponível durante o build (o Docker build não tem acesso à rede do compose). Precisamos separar o build da instalação — compilar com Maven no build, e rodar o Ant no entrypoint em runtime, quando o banco já está no ar.


