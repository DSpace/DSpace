Dockerfile (multi-stage)
Stage 1 (builder): usa maven:3.9-eclipse-temurin-17 para compilar o projeto com mvn package
Stage 2 (runtime): usa uma JRE enxuta, instala o Ant, executa ant fresh_install e sobe o backend via o Runnable JAR (server-boot.jar) — sem precisar de Tomcat separado
docker-compose.yml
Orquestra 4 serviços:

Serviço	Imagem	Porta
postgres	postgres:16-alpine	interno
solr	solr:9-slim	8983
solr-init	(build local)	—
dspace-backend	(build local)	8080
O solr-init é um init container que copia os cores Solr gerados pelo DSpace para o volume compartilhado com o Solr — etapa obrigatória que a documentação menciona (cp -R [dspace]/solr/* [solr]/server/solr/configsets).

Para subir tudo
bash
cp .env.example .env        # configure a senha do banco
docker compose up -d --build
docker compose exec dspace-backend /dspace/bin/dspace create-administrator
O README inclui todos os comandos úteis e dicas de configuração para produção (HTTPS, segurança do Solr, backups).

